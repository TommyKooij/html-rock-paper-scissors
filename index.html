<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="/css/styles.css" />
  </head>

  <body>
    <div id="content-container">
      <div id="main-window">
        <h1 id="window-title">Rock Paper Scissors</h1>

        <div id="button-group">
          <button class="btn" data-choice="rock">Rock</button>
          <button class="btn" data-choice="paper">Paper</button>
          <button class="btn" data-choice="scissors">Scissors</button>
        </div>

        <div id="game-stats">
          <div id="player-choice">Your Choice: -</div>
          <div id="computer-choice">Computer's Choice: -</div>

          <div id="player-score">Your Score: 0</div>
          <div id="computer-score">Computer's Score: 0</div>

          <div id="result-alert"></div>
        </div>
      </div>
    </div>

    <script src="/js/actions.js"></script>
  </body>
</html>
